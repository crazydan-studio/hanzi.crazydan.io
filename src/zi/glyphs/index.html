<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>汉字 | 字形列表</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <script type="module" src="./index.js"></script>
  </head>
  <body
    class="bg-gradient-to-br from-amber-50 to-orange-50 font-sans antialiased"
  >
    <div class="max-w-6xl mx-auto py-6 md:py-10">
      <div
        class="fixed top-2 right-0 left-0 z-1000 flex flex-row justify-center pointer-events-none"
      >
        <div
          class="flex flex-row justify-center items-center gap-4 rounded-full py-2 px-8 w-fit h-12 bg-gradient-to-r from-amber-100/70 to-orange-100/70 border border-amber-300 shadow-md pointer-events-auto"
        >
          <button
            id="page_prevBtn"
            class="text-amber-600 underline cursor-pointer"
          >
            上一页
          </button>
          <span class="text-gray-700">
            <r-template id="template_charGridPager">
              <div
                id="page_gotoInput"
                contenteditable="true"
                class="inline-block pr-1 focus:ring-2 focus:ring-amber-200 outline-none text-center rounded-md cursor-pointer"
              >
                {{page.current}}
              </div>
              <span>/ 共 {{page.total}} 页</span>
            </r-template>

            <span>...</span>
          </span>
          <button
            id="page_nextBtn"
            class="text-amber-600 underline cursor-pointer"
          >
            下一页
          </button>
        </div>
      </div>
      <div class="flex flex-col gap-4 pt-10">
        <r-template id="template_charGridNetError">
          <div
            class="col-span-full text-center py-8 bg-red-50 rounded-xl border border-red-200"
          >
            <div class="text-red-600 text-lg mb-1">⚠️ 加载失败</div>
            <p class="text-sm text-red-500">{{msg}}</p>
            <button
              onclick="location.reload()"
              class="mt-3 bg-amber-600 text-white px-4 py-1.5 rounded-full text-sm hover:bg-amber-700 transition"
            >
              重新加载
            </button>
          </div>
        </r-template>
        <r-template id="template_charGridCard">
          <div
            for="char in chars"
            class="char-glyph-card flex flex-row gap-4 justify-start items-start border-t-1 pt-4 border-amber-600"
            data-char="{{char.value}}"
            data-glyph-type="{{char.glyph_type}}"
          >
            <div class="text-4xl text-amber-600 flex flex-row items-center">
              <span class="flex flex-col items-center gap-2">
                <span class="text-sm text-blue-800">{{char.spell}}</span>
                <a
                  class="underline"
                  href="/zi/?v={{char.value}}"
                  target="_blank"
                >
                  {{char.value}}
                </a>

                <button
                  onclick="javascript:$copyText('{{char.value}}')"
                  class="text-amber-500 text-sm underline cursor-pointer"
                >
                  复制
                </button>
              </span>
              <span>：</span>
            </div>
            <div class="flex flex-row gap-2">
              <r-template name="template_charGlyph">
                <div class="flex flex-col justify-start items-center">
                  <div class="tianzi-grid bg-white">
                    <div
                      class="char-glyph w-16 h-16"
                      html="{{glyph_svg}}"
                    ></div>
                  </div>
                  <div class="label">(字形)</div>
                </div>

                <div class="flex flex-row flex-wrap gap-2">
                  <div
                    if="has_stroke"
                    for="step in stroke_steps"
                    class="stroke-step flex flex-col items-center"
                  >
                    <div class="tianzi-grid bg-amber-50">
                      <div
                        class="char-glyph w-16 h-16"
                        shadow
                        html="{{step.svg}}"
                      ></div>
                    </div>
                    <div class="label">({{step.index}})</div>
                  </div>
                </div>
              </r-template>

              <div
                class="col-span-full text-center py-10 text-amber-600 loading-pulse"
              >
                <div class="inline-block">
                  ⏳ 正在加载「{{char.value}}」的字形...
                </div>
              </div>
            </div>
          </div>
        </r-template>

        <div
          class="col-span-full text-center py-10 text-amber-600 loading-pulse"
        >
          <div class="inline-block">⏳ 正在加载字形列表...</div>
        </div>
      </div>
    </div>
  </body>
</html>
