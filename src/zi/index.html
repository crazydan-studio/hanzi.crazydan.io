<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>汉字 | 汉字详情与笔顺</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="../index.css" />
    <link rel="stylesheet" href="./zi.css" />
    <script type="module" src="./index.js"></script>
  </head>
  <body
    class="bg-gradient-to-br from-amber-50 to-orange-50 font-sans antialiased"
  >
    <div class="max-w-5xl mx-auto px-4 py-6 md:py-10">
      <div class="text-center mb-8">
        <h1
          class="text-3xl md:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-amber-700 to-orange-700"
        >
          汉字详情
        </h1>
        <div class="w-20 h-0.5 bg-amber-400 mx-auto mt-3 rounded-full"></div>
      </div>

      <div class="mb-5 text-sm">
        <a
          href="/"
          class="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 transition"
        >
          ← 返回首页
        </a>
      </div>

      <div
        class="bg-white/90 shadow-md rounded-2xl shadow-2xl overflow-hidden border border-amber-200"
      >
        <div
          class="col-span-full text-center py-10 text-amber-600 loading-pulse"
        >
          <div class="inline-block">⏳ 正在加载汉字信息...</div>
        </div>

        <r-template id="template_charDetailCard">
          <div class="p-5 md:p-8">
            <div class="flex flex-col gap-8">
              <div class="flex flex-col lg:flex-row gap-8">
                <div class="lg:w-1/2">
                  <div
                    class="bg-amber-50 rounded-2xl p-4 border border-amber-200"
                  >
                    <div class="flex justify-center mb-4">
                      <div class="tianzi-grid bg-white">
                        <div
                          class="zi-glyph w-72 h-72 md:w-56 md:h-56"
                          html="{{stroke_svg}}"
                        ></div>
                      </div>
                    </div>
                    <div if="stroke_svg" class="mt-2 bg-white p-3 rounded-xl">
                      <div
                        class="flex flex-wrap gap-3 justify-center items-center"
                      >
                        <div class="flex gap-2">
                          <button
                            id="playAnimBtn"
                            class="bg-amber-600 hover:bg-amber-700 text-white px-4 py-1.5 rounded-full text-sm flex items-center gap-1"
                          >
                            ▶ 播放
                          </button>
                          <button
                            id="pauseAnimBtn"
                            class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-1.5 rounded-full text-sm"
                          >
                            ⏸ 暂停
                          </button>
                          <button
                            id="resetAnimBtn"
                            class="border border-amber-300 text-amber-700 px-3 py-1.5 rounded-full text-sm"
                          >
                            ⟳ 重置
                          </button>
                        </div>
                        <div class="flex items-center gap-2 text-sm">
                          <span class="text-gray-600">速度</span>
                          <input
                            type="range"
                            id="speedSlider"
                            min="0.5"
                            max="3"
                            step="0.05"
                            value="1"
                            class="w-28"
                          />
                          <span id="speedValue" class="w-10 text-amber-700">
                            1.0x
                          </span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="lg:w-1/2 space-y-4">
                  <div class="bg-white rounded-xl p-4 border border-amber-200">
                    <div
                      class="flex flex-wrap justify-between items-center gap-2"
                    >
                      <h2 class="text-4xl font-bold text-amber-800">
                        {{value}}
                      </h2>
                      <div class="flex gap-2 text-xs">
                        <a
                          href="https://www.zdic.net/hans/{{value}}"
                          target="_blank"
                          class="bg-amber-100 text-amber-800 px-2 py-1 rounded-full"
                        >
                          🔗 汉典网详情
                        </a>
                      </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mt-4">
                      <div>
                        <span class="text-gray-500">汉字：</span>
                        <span>
                          <span>{{value}}</span>
                          <button
                            onclick="javascript:$copyText('{{value}}')"
                            class="ml-1 text-amber-500 text-xs underline cursor-pointer"
                          >
                            复制
                          </button>
                        </span>
                      </div>
                      <div class="col-span-2">
                        <span class="text-gray-500">拼音：</span>
                        <div class="inline-flex flex-wrap gap-2">
                          <span for="s in spells">
                            <span>
                              <span>{{s.value}}</span>
                              <button
                                onclick="javascript:$copyText('{{s.value}}')"
                                class="ml-1 text-amber-500 text-xs underline cursor-pointer"
                              >
                                复制
                              </button>
                            </span>
                            <button
                              if="s.audio"
                              onclick="javascript:$playAudio('/assets/audio/pinyin/{{s.value}}.mp3')"
                              class="ml-1 text-amber-500 text-xs underline cursor-pointer"
                            >
                              试听
                            </button>
                            <span> / </span>
                          </span>
                        </div>
                      </div>
                      <div>
                        <span class="text-gray-500">部首：</span>
                        <span>
                          <span>{{radical}}</span>
                          <button
                            onclick="javascript:$copyText('{{radical}}')"
                            class="ml-1 text-amber-500 text-xs underline cursor-pointer"
                          >
                            复制
                          </button>
                        </span>
                      </div>
                      <div>
                        <span class="text-gray-500">笔画数：</span>
                        <span>{{stroke_count}}</span>
                      </div>
                      <div>
                        <span class="text-gray-500">结构：</span>
                        <span>{{struct}}</span>
                      </div>
                      <div>
                        <span class="text-gray-500">Unicode：</span>
                        <span>
                          <span>{{unicode}}</span>
                          <button
                            onclick="javascript:$copyText('{{unicode}}')"
                            class="ml-1 text-amber-500 text-xs underline cursor-pointer"
                          >
                            复制
                          </button>
                        </span>
                      </div>
                    </div>
                  </div>
                </div>
              </div>

              <div class="bg-white rounded-xl p-4 border border-amber-200">
                <div class="flex justify-between items-center">
                  <h3 class="font-bold text-amber-800">🖌️ 笔画分解</h3>
                  <div class="flex gap-2 text-xs">
                    <a
                      if="has_stroke"
                      href="https://www.strokeorder.com/chinese/{{value}}"
                      target="_blank"
                      class="bg-amber-100 text-amber-800 px-2 py-1 rounded-full"
                    >
                      🔗 StrokeOrder.com 笔顺图
                    </a>
                  </div>
                </div>
                <div if="has_stroke" class="flex flex-wrap gap-2 mt-3">
                  <div
                    for="step in stroke_steps"
                    class="tianzi-grid stroke-step bg-amber-50"
                  >
                    <div
                      class="zi-glyph w-32 h-32 md:w-32 md:h-32"
                      html="{{step}}"
                    ></div>
                  </div>
                </div>

                <div
                  if="!has_stroke"
                  class="col-span-full text-center py-8 bg-red-50 rounded-xl"
                >
                  <div class="text-red-600">⚠️ 无笔画数据</div>
                </div>
              </div>
            </div>
          </div>
        </r-template>

        <r-template id="template_charDetailNetError">
          <div
            class="col-span-full text-center py-8 bg-red-50 rounded-xl border border-red-200"
          >
            <div class="text-red-600 text-lg mb-1">⚠️ 加载失败</div>
            <p class="text-sm text-red-500">{{msg}}</p>
            <button
              onclick="location.reload()"
              class="mt-3 bg-amber-600 text-white px-4 py-1.5 rounded-full text-sm hover:bg-amber-700 transition"
            >
              重新加载
            </button>
            <a
              href="/"
              class="mt-2 inline-block text-amber-600 underline text-sm ml-3"
            >
              返回首页
            </a>
            <a
              href="https://github.com/crazydan-studio/hanzi.crazydan.io/issues"
              target="_blank"
              class="mt-2 inline-block text-amber-600 underline text-sm ml-3"
            >
              去 GitHub 反馈
            </a>
          </div>
        </r-template>
        <r-template id="template_charDetailInvalidURL">
          <div
            class="col-span-full text-center py-8 bg-red-50 rounded-xl border border-red-200"
          >
            <div class="text-red-600 text-lg mb-1">⚠️ 无效的链接</div>
            <p class="text-sm text-red-500">
              请通过正确的链接访问，例如 /zi/?v=中
            </p>
            <a
              href="/"
              class="mt-3 inline-block bg-amber-600 text-white px-4 py-1.5 rounded-full text-sm hover:bg-amber-700 transition"
            >
              返回首页
            </a>
          </div>
        </r-template>
      </div>

      <!--% thanksHtmlFragment %-->
    </div>
  </body>
</html>
