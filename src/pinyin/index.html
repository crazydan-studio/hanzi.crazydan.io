<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>汉字 | 拼音字列表</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <script type="module" src="./index.js"></script>
  </head>
  <body
    class="bg-gradient-to-br from-amber-50 to-orange-50 font-sans antialiased"
  >
    <div class="max-w-6xl mx-auto px-4 py-6 md:py-10">
      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl">
          <span>🔍</span>
          <span
            class="font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-amber-700 to-orange-700"
          >
            <r-template id="template_pageTitle">
              <span>{{title}}</span>
            </r-template>
            <span>拼音字列表</span>
          </span>
        </h1>
        <div class="w-20 h-0.5 bg-amber-400 mx-auto mt-3 rounded-full"></div>
      </div>

      <div
        class="mb-5 text-sm flex flex-wrap justify-between items-center gap-2"
      >
        <a
          href="/"
          class="inline-flex items-center gap-1 text-amber-700 hover:text-amber-900 transition"
        >
          ← 返回首页
        </a>
        <a
          href="/zi/commons/"
          class="inline-flex items-center gap-1 text-amber-600 hover:text-amber-800 text-sm"
        >
          📚 常用字列表
        </a>
      </div>

      <div
        class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-4"
      >
        <r-template id="template_ziGridNetError">
          <div
            class="col-span-full text-center py-8 bg-red-50 rounded-xl border border-red-200"
          >
            <div class="text-red-600 text-lg mb-1">⚠️ 加载失败</div>
            <p class="text-sm text-red-500">{{msg}}</p>
            <button
              onclick="location.reload()"
              class="mt-3 bg-amber-600 text-white px-4 py-1.5 rounded-full text-sm hover:bg-amber-700 transition"
            >
              重新加载
            </button>
            <a
              href="/"
              class="mt-2 inline-block text-amber-600 underline text-sm ml-3"
            >
              返回首页
            </a>
            <a
              href="https://github.com/crazydan-studio/hanzi.crazydan.io/issues"
              target="_blank"
              class="mt-2 inline-block text-amber-600 underline text-sm ml-3"
            >
              去 GitHub 反馈
            </a>
          </div>
        </r-template>
        <r-template id="template_ziGridInvalidURL">
          <div
            class="col-span-full text-center py-8 bg-red-50 rounded-xl border border-red-200"
          >
            <div class="text-red-600 text-lg mb-1">⚠️ 无效的链接</div>
            <p class="text-sm text-red-500">
              请通过正确的链接访问，例如 /pinyin/?v=zhong
            </p>
            <a
              href="/"
              class="mt-3 inline-block bg-amber-600 text-white px-4 py-1.5 rounded-full text-sm hover:bg-amber-700 transition"
            >
              返回首页
            </a>
          </div>
        </r-template>
        <r-template id="template_ziGridCard">
          <!--% ziesHtmlFragment %-->
        </r-template>
        <r-template id="template_ziGridEmpty">
          <div class="col-span-full text-center py-10 text-gray-500">
            暂无汉字数据
          </div>
        </r-template>

        <div
          class="col-span-full text-center py-10 text-amber-600 loading-pulse"
        >
          <div class="inline-block">⏳ 正在加载拼音字...</div>
        </div>
      </div>
    </div>
  </body>
</html>
